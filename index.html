<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raman Kumar | Interactive Portfolio</title>
    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .app-container { max-width: 850px; margin: 0 auto; background: #fff; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        header { background: var(--dark); color: white; padding: 40px 20px; text-align: center; }
        .content { padding: 30px; }
        .btn-group { display: flex; gap: 12px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; background: #f1f5f9; transition: 0.3s; color: var(--dark); }
        button:hover { background: var(--primary); color: white; transform: translateY(-2px); }
        #display-area { background: #ffffff; border-radius: 12px; padding: 25px; min-height: 180px; border: 2px solid #e2e8f0; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; animation: fadeIn 0.5s; }
        th, td { padding: 14px; border: 1px solid #edf2f7; text-align: left; }
        th { background: var(--primary); color: white; }
        .footer-action { margin-top: 35px; text-align: center; padding-top: 25px; border-top: 1px solid #e2e8f0; }
        .pdf-btn { display: inline-block; background: #10b981; color: white; padding: 16px 35px; text-decoration: none; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .pdf-btn:hover { background: #059669; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Raman Kumar Baroliya</h1>
        <p>B.Tech IT | Roll No: 40 | GEC Ajmer</p>
    </header>

    <div class="content">
        <div class="btn-group">
            <button onclick="fetchInfo()">Project Overview</button>
            <button onclick="fetchStats()">Execution Data</button>
            <button onclick="resetDisplay()">Clear Dashboard</button>
        </div>

        <div id="display-area">
            <p style="text-align:center; color:#94a3b8; padding-top:50px;">Ready to fetch data from backend...</p>
        </div>

        <div class="footer-action">
            <a href="com.%20in%20system%20and%20languages.pdf" class="pdf-btn" target="_blank">📄 Download Full Project Report (PDF)</a>
        </div>
    </div>
</div>

<script>
    async function fetchInfo() {
        const res = await fetch('data.json');
        const data = await res.json();
        const out = document.getElementById('display-area');
        out.innerHTML = `
            <h3 style="color:var(--primary);">${data.project_info.title}</h3>
            <p><strong>Institution:</strong> ${data.project_info.college}</p>
            <p><strong>Analysis:</strong> Comparative performance of algorithms across C, C++, Java, and Python on Windows and Linux environments.</p>
        `;
    }

    async function fetchStats() {
        const res = await fetch('data.json');
        const data = await res.json();
        const out = document.getElementById('display-area');
        let html = `<table><thead><tr><th>Language</th><th>Runtime</th><th>Memory</th></tr></thead><tbody>`;
        data.results.forEach(row => {
            html += `<tr><td><strong>${row.language}</strong></td><td>${row.runtime}</td><td>${row.memory}</td></tr>`;
        });
        html += `</tbody></table>`;
        out.innerHTML = html;
    }

    function resetDisplay() {
        document.getElementById('display-area').innerHTML = '<p style="text-align:center; color:#94a3b8; padding-top:50px;">Dashboard Cleared.</p>';
    }
</script>

</body>
</html>
