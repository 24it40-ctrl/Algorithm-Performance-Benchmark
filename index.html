<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoMetric | Raman Kumar</title>
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --success: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; text-align: center; }
        
        /* Auth Overlay */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-card { background: white; padding: 40px; border-radius: 15px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .auth-card h2 { margin-bottom: 20px; color: var(--dark); }
        .auth-card input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        
        /* Main UI */
        #app-content { display: none; max-width: 1000px; margin: 20px auto; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: var(--dark); color: white; padding: 40px; position: relative; }
        .stats-bar { display: flex; justify-content: center; gap: 30px; padding: 15px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; font-weight: bold; }
        .dashboard { padding: 30px; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-logout { position: absolute; top: 20px; right: 20px; background: #ef4444; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; }
        th { background: #f8fafc; }
        .footer { padding: 30px; background: #fff; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 id="auth-title">Welcome Back</h2>
        <input type="text" id="login-user" placeholder="Enter Name">
        <input type="password" id="login-pass" placeholder="Enter Password">
        <button class="btn-blue" style="width:100%" onclick="handleLogin()">Login / Sign Up</button>
        <p style="font-size: 0.8em; color: #64748b; margin-top: 15px;">Enter any name to start</p>
    </div>
</div>

<div id="app-content">
    <header>
        <button class="btn-logout" onclick="logout()">Logout</button>
        <h1>AlgoMetric Dashboard</h1>
        <p>Project by Raman Kumar (24IT40)</p>
    </header>

    <div class="stats-bar">
        <span>👁️ Views: <span id="view-count">0</span></span>
        <span style="cursor:pointer" onclick="addLike()">👍 Likes: <span id="like-count">0</span></span>
    </div>

    <div class="dashboard">
        <div class="controls">
            <button class="btn-blue" onclick="loadTable('windows_11')">Windows 11 Results</button>
            <button class="btn-blue" style="background:#d97706" onclick="loadTable('kali_linux')">Kali Linux Results</button>
        </div>
        <div id="table-area">
            <p style="text-align:center; color:#94a3b8; margin-top:50px;">Select an OS to view benchmark data.</p>
        </div>
    </div>

    <div class="footer">
        <a href="assignment.pdf" style="color: var(--primary); font-weight: bold;" target="_blank">📄 View Project PDF</a>
    </div>
</div>

<script>
    const site_id = "24it40-raman-benchmark-final"; // अपनी ID

    // 1. Login Function
    function handleLogin() {
        const user = document.getElementById('login-user').value;
        if(user.trim() !== "") {
            localStorage.setItem('raman_user', user);
            showApp();
        } else {
            alert("Please enter your name!");
        }
    }

    // 2. Show App if logged in
    function showApp() {
        const user = localStorage.getItem('raman_user');
        if(user) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            updateStats();
        }
    }

    // 3. Stats (Views/Likes)
    async function updateStats() {
        try {
            // Visit count
            const vRes = await fetch(`https://api.countapi.xyz/hit/${site_id}/visits`);
            const vData = await vRes.json();
            document.getElementById('view-count').innerText = vData.value;

            // Like count
            const lRes = await fetch(`https://api.countapi.xyz/get/${site_id}/likes`);
            const lData = await lRes.json();
            document.getElementById('like-count').innerText = lData.value || 0;
        } catch(e) { console.log("Stats error"); }
    }

    async function addLike() {
        const res = await fetch(`https://api.countapi.xyz/hit/${site_id}/likes`);
        const data = await res.json();
        document.getElementById('like-count').innerText = data.value;
        alert("Liked! Thank you, " + localStorage.getItem('raman_user'));
    }

    // 4. Table Logic
    async function loadTable(os) {
        try {
            const resp = await fetch('data.json');
            const data = await resp.json();
            const rows = data.benchmarks[os];
            let html = `<h3>${os.toUpperCase()} Results</h3><table><tr><th>Logic</th><th>Py</th><th>C++</th><th>Java</th><th>C</th></tr>`;
            rows.forEach(r => {
                html += `<tr><td>${r.logic}</td><td>${r.py}</td><td>${r.cpp}</td><td>${r.java}</td><td>${r.c}</td></tr>`;
            });
            html += `</table>`;
            document.getElementById('table-area').innerHTML = html;
        } catch(e) { alert("Error loading data.json"); }
    }

    function logout() {
        localStorage.removeItem('raman_user');
        location.reload();
    }

    // Check login state on refresh
    window.onload = showApp;
</script>

</body>
</html>
