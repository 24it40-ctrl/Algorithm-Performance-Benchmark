<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoMetric Pro | Raman Kumar</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --gold: #f59e0b; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding-bottom: 50px; text-align: center; }
        .container { max-width: 950px; margin: 20px auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: var(--dark); color: white; padding: 40px; }
        
        /* Like Dislike Section */
        .stats-bar { display: flex; justify-content: center; gap: 20px; padding: 15px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .stat-btn { background: white; border: 1px solid #e2e8f0; padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .stat-btn:hover { background: #f1f5f9; }
        .stat-btn.active-like { border-color: var(--success); color: var(--success); }
        .stat-btn.active-dislike { border-color: var(--danger); color: var(--danger); }

        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; margin: 5px; }
        .btn-blue { background: var(--primary); }
        .btn-download { background: var(--gold); font-size: 1.2em; margin-top: 30px; }
        
        /* Modal Styles */
        #secure-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 9999; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 350px; }
        .qr-img { width: 200px; height: 200px; margin: 15px auto; border: 3px solid #f1f5f9; border-radius: 12px; }
        input { width: 90%; padding: 12px; margin: 12px 0; border: 2px solid #e2e8f0; border-radius: 8px; text-align: center; font-size: 16px; }
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AlgoMetric Pro 🚀</h1>
        <p>Analysis by Raman Kumar | Roll No: 40 | GEC Ajmer</p>
    </header>

    <div class="stats-bar">
        <button id="likeBtn" class="stat-btn" onclick="handleReaction('like')">
            👍 <span id="likeCount">104</span>
        </button>
        <button id="dislikeBtn" class="stat-btn" onclick="handleReaction('dislike')">
            👎 <span id="dislikeCount">2</span>
        </button>
        <div class="stat-btn" style="cursor: default;">👁️ Views: 1,450</div>
    </div>

    <div style="padding: 40px;">
        <h3>Benchmark PDF Report</h3>
        <p>C, C++, Java और Python के परफॉरमेंस की पूरी रिपोर्ट के लिए नीचे क्लिक करें।</p>
        <button class="btn btn-download" onclick="startSecureDownload()">📥 Get Full Report PDF</button>
    </div>
</div>

<div id="secure-modal">
    <div class="card">
        <div id="step-1" class="step active">
            <h3>📧 स्टेप 1: ईमेल ओटीपी</h3>
            <input type="email" id="email-in" placeholder="Email Address">
            <button class="btn btn-blue" style="width:100%" onclick="sendEmailOTP()">Send OTP</button>
        </div>
        <div id="step-2" class="step">
            <h3>Verify OTP</h3>
            <input type="text" id="otp-in" placeholder="Enter 4-digit code">
            <button class="btn btn-blue" style="width:100%" onclick="verifyEmailOTP()">Verify OTP</button>
        </div>
        <div id="step-3" class="step">
            <h3>💰 स्टेप 2: पेमेंट</h3>
            <img src="GooglePay_QR .png" alt="QR" class="qr-img">
            <input type="text" id="key-in" placeholder="Secret Key डालें">
            <button class="btn btn-blue" style="width:100%; background:var(--success);" onclick="unlockFinal()">Unlock PDF</button>
            <a href="https://wa.me/917742987003?text=Bhai%20payment%20kar%20diya%20hai%20key%20do" target="_blank" style="color:green; display:block; margin-top:15px; font-weight:bold; text-decoration:none;">WhatsApp Raman for Key</a>
        </div>
        <button style="background:none; border:none; color:#94a3b8; margin-top:20px; cursor:pointer;" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
    // --- कॉन्फ़िगरेशन ---
    const SERVICE_ID = "service_ay285wb";
    const TEMPLATE_ID = "template_37rcyad";
    const PUBLIC_KEY = "GVPqUQLi_2-VcoVSP";
    const FINAL_SECRET = "885522";

    emailjs.init(PUBLIC_KEY);
    let generatedOTP;

    // --- Like/Dislike Backend Logic ---
    let likes = parseInt(localStorage.getItem('ramanLikes')) || 104;
    let dislikes = parseInt(localStorage.getItem('ramanDislikes')) || 2;
    let userAction = localStorage.getItem('userAction'); // 'like' or 'dislike'

    document.getElementById('likeCount').innerText = likes;
    document.getElementById('dislikeCount').innerText = dislikes;

    function handleReaction(type) {
        if (userAction === type) return; // पहले से वही किया है तो कुछ न करें

        if (type === 'like') {
            likes++;
            if (userAction === 'dislike') dislikes--;
            userAction = 'like';
        } else {
            dislikes++;
            if (userAction === 'like') likes--;
            userAction = 'dislike';
        }

        localStorage.setItem('ramanLikes', likes);
        localStorage.setItem('ramanDislikes', dislikes);
        localStorage.setItem('userAction', userAction);
        
        updateUI();
    }

    function updateUI() {
        document.getElementById('likeCount').innerText = likes;
        document.getElementById('dislikeCount').innerText = dislikes;
        document.getElementById('likeBtn').className = 'stat-btn' + (userAction === 'like' ? ' active-like' : '');
        document.getElementById('dislikeBtn').className = 'stat-btn' + (userAction === 'dislike' ? ' active-dislike' : '');
    }

    // --- OTP & Download Logic ---
    function startSecureDownload() { document.getElementById('secure-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('secure-modal').style.display = 'none'; }

    function sendEmailOTP() {
        const email = document.getElementById('email-in').value;
        if(!email.includes('@')) return alert("Sahi email dale!");
        generatedOTP = Math.floor(1000 + Math.random() * 9000);
        emailjs.send(SERVICE_ID, TEMPLATE_ID, { to_email: email, otp_code: generatedOTP, from_name: "Raman Kumar" })
            .then(() => {
                alert("OTP Sent!");
                document.getElementById('step-1').classList.remove('active');
                document.getElementById('step-2').classList.add('active');
            });
    }

    function verifyEmailOTP() {
        if(document.getElementById('otp-in').value == generatedOTP) {
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-3').classList.add('active');
        } else { alert("Wrong OTP!"); }
    }

    function unlockFinal() {
        if(document.getElementById('key-in').value === FINAL_SECRET) {
            window.open('assignment.pdf', '_blank');
            closeModal();
        } else { alert("Wrong Key!"); }
    }
    
    updateUI();
</script>
</body>
</html>
