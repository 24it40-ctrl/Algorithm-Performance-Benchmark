<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoMetric Pro | Raman Kumar | GEC Ajmer</title>
    
    <meta name="description" content="Official Research Portal by Raman Kumar, IT Student at GEC Ajmer.">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --accent: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; user-select: none; overflow-x: hidden; }
        header { background: var(--dark); color: white; padding: 40px; text-align: center; border-bottom: 5px solid var(--primary); }
        .container { max-width: 1000px; margin: -30px auto 50px; background: white; border-radius: 20px; box-shadow: 0 15px 45px rgba(0,0,0,0.1); overflow: hidden; }
        
        .tab-nav { display: flex; background: #f1f5f9; border-bottom: 2px solid #e2e8f0; }
        .tab-btn { flex: 1; padding: 20px; border: none; background: none; cursor: pointer; font-weight: bold; color: #64748b; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--primary); border-bottom: 4px solid var(--primary); }
        
        .panel { padding: 40px; display: none; }
        .panel.active { display: block; }

        /* Comment Box Styles */
        .comment-section { margin-top: 40px; padding: 20px; border-top: 2px solid #eee; background: #fafafa; }
        .comment-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .comment-input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .comment-list { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .comment-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid var(--primary); }
        .comment-name { font-weight: bold; color: var(--dark); font-size: 14px; margin-bottom: 5px; }
        .comment-text { color: #444; font-size: 14px; line-height: 1.4; }
        .comment-time { font-size: 11px; color: #999; margin-top: 8px; }

        .btn-action { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-unlock { background: linear-gradient(135deg, var(--accent), #d97706); color: white; padding: 20px 60px; border: none; border-radius: 50px; font-size: 1.2rem; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body oncontextmenu="return false;">

<header>
    <h1>AlgoMetric Pro 🚀</h1>
    <p>Raman Kumar | GEC Ajmer IT Portfolio</p>
</header>

<div class="container">
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab(event, 'p-table')">📊 Data & Interaction</button>
        <button class="tab-btn" onclick="switchTab(event, 'p-pdf')">📜 Analysis Report</button>
    </div>

    <div id="p-table" class="panel active">
        <h3>Performance Analysis</h3>
        <p>लाइक करें और अपने विचार नीचे कमेंट बॉक्स में लिखें!</p>
        
        <div style="display:flex; justify-content:center; gap:20px; margin-bottom: 30px;">
            <button id="like-btn" class="tab-btn" style="border:1px solid #ddd; border-radius:10px;" onclick="handleReaction('likes')">👍 <span id="lCount">0</span> Likes</button>
            <div class="tab-btn" style="border:1px solid #ddd; border-radius:10px; cursor:default;">👁️ <span id="vCount">0</span> Views</div>
        </div>

        <div class="comment-section">
            <h3>कमेंट बॉक्स (Comments)</h3>
            <div class="comment-form">
                <input type="text" id="c-name" class="comment-input" placeholder="आपका नाम">
                <textarea id="c-text" class="comment-input" rows="3" placeholder="अपना कमेंट यहाँ लिखें..."></textarea>
                <button class="btn-action" onclick="postComment()">कमेंट पोस्ट करें</button>
            </div>
            <div id="comment-list" class="comment-list">
                <p style="color:gray; text-align:center;">लोड हो रहा है...</p>
            </div>
        </div>
    </div>

    <div id="p-pdf" class="panel">
        <div style="position:relative; width:100%; height:600px; border:2px solid #ddd; border-radius:12px; overflow:hidden;">
            <div style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:100;"></div>
            <iframe src="assignment.pdf#toolbar=0&navpanes=0&scrollbar=0" style="width:100%; height:100%; border:none;"></iframe>
        </div>
        <div style="text-align:center; padding-top:20px;">
            <button class="btn-unlock" onclick="window.location.href='#p-table'">Download Full Files (₹10)</button>
        </div>
    </div>
</div>

<script>
    // --- 🔑 FIREBASE CONFIG (Original) ---
    const config = {
        apiKey: "AIzaSyAc4n2sy6L8aOZMO6SMo0JifaiCKltUf9s",
        authDomain: "raman-project-259f4.firebaseapp.com",
        databaseURL: "https://raman-project-259f4-default-rtdb.firebaseio.com",
        projectId: "raman-project-259f4",
        storageBucket: "raman-project-259f4.firebasestorage.app",
        messagingSenderId: "327813943239",
        appId: "1:327813943239:web:a12cb09f169807180113e2"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    // Stats Listener
    db.ref('stats/views').transaction(c => (c || 0) + 1);
    db.ref('stats').on('value', snap => {
        const d = snap.val() || {likes:0, views:0};
        document.getElementById('lCount').innerText = d.likes;
        document.getElementById('vCount').innerText = d.views;
    });

    // --- 🚫 ONE-TIME LIKE LOGIC ---
    function handleReaction(type) {
        if (localStorage.getItem('raman_voted_final')) {
            alert("आप पहले ही लाइक कर चुके हैं!"); return;
        }
        db.ref('stats/' + type).transaction(c => (c || 0) + 1);
        localStorage.setItem('raman_voted_final', 'true');
        document.getElementById('like-btn').style.opacity = "0.5";
    }

    // --- 💬 COMMENT LOGIC ---
    function postComment() {
        const name = document.getElementById('c-name').value;
        const text = document.getElementById('c-text').value;

        if(!name || !text) { alert("नाम और कमेंट दोनों भरें!"); return; }

        const newComment = {
            name: name,
            text: text,
            time: new Date().toLocaleString('hi-IN')
        };

        db.ref('comments').push(newComment); // डेटाबेस में नया कमेंट जोड़ना
        document.getElementById('c-name').value = '';
        document.getElementById('c-text').value = '';
    }

    // कमेंट्स को रीयल-टाइम में दिखाना
    db.ref('comments').on('value', snap => {
        const list = document.getElementById('comment-list');
        list.innerHTML = '';
        const data = snap.val();
        if(data) {
            Object.values(data).reverse().forEach(c => {
                list.innerHTML += `
                    <div class="comment-card">
                        <div class="comment-name">${c.name}</div>
                        <div class="comment-text">${c.text}</div>
                        <div class="comment-time">${c.time}</div>
                    </div>
                `;
            });
        } else {
            list.innerHTML = '<p style="color:gray; text-align:center;">कोई कमेंट नहीं है। पहले आप लिखें!</p>';
        }
    });

    function switchTab(e, id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
