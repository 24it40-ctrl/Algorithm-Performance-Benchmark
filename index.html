<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raman Kumar | Interactive Portfolio</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .app-container { max-width: 900px; margin: 0 auto; background: var(--card); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        header { background: #1e293b; color: white; padding: 40px 20px; text-align: center; }
        .content { padding: 30px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; background: #e2e8f0; }
        button:hover { background: var(--primary); color: white; transform: translateY(-2px); }
        #display-area { background: #f1f5f9; border-radius: 12px; padding: 20px; min-height: 200px; border: 2px dashed #cbd5e1; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #dee2e6; text-align: center; }
        th { background: #2563eb; color: white; }
        .footer-links { margin-top: 30px; text-align: center; }
        .pdf-btn { display: inline-block; background: #10b981; color: white; padding: 15px 30px; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 id="user-name">Loading Profile...</h1>
        <p>IT Department | Roll No: 40 | GEC Ajmer</p>
    </header>

    <div class="content">
        <h3 style="text-align: center;">Interactive Backend Dashboard</h3>
        <p style="text-align: center; color: #64748b;">Click the buttons below to fetch data from the JSON "Database"</p>
        
        <div class="btn-group">
            <button onclick="fetchProjectInfo()">About Project</button>
            <button onclick="fetchResults()">View Performance Data</button>
            <button onclick="clearScreen()">Clear Dashboard</button>
        </div>

        <div id="display-area">
            <p style="text-align:center; color:#94a3b8; margin-top:80px;">The results will appear here once you click a button.</p>
        </div>

        <div class="footer-links">
            <a href="./assignment 1.pdf" class="btn" id="pdf-link" target="_blank">📄 Download Full Report (PDF)</a>
        </div>
    </div>
</div>

<script>
    // यह आपका "Frontend Logic" है जो JSON से डेटा "Fetch" करता है
    async function loadInitialData() {
        try {
            const response = await fetch('./data.json');
            const data = await response.json();
            document.getElementById('user-name').innerText = data.project_info.student;
        } catch (error) { console.error("Could not load initial data."); }
    }

    async function fetchProjectInfo() {
        const response = await fetch('./data.json');
        const data = await response.json();
        const display = document.getElementById('display-area');
        display.innerHTML = `
            <h4>Project Title: ${data.project_info.title}</h4>
            <p><strong>Goal:</strong> Comparative analysis of algorithms on Windows 11 and Kali Linux.</p>
            <p><strong>Status:</strong> Completed & Documented.</p>
        `;
    }

    async function fetchResults() {
        const response = await fetch('./data.json');
        const data = await response.json();
        const display = document.getElementById('display-area');
        
        let tableHTML = `<table><thead><tr><th>Language</th><th>Runtime</th><th>Memory</th><th>Efficiency</th></tr></thead><tbody>`;
        
        data.results.forEach(item => {
            tableHTML += `<tr>
                <td>${item.language}</td>
                <td>${item.execution_time}</td>
                <td>${item.memory}</td>
                <td>${item.efficiency}</td>
            </tr>`;
        });
        
        tableHTML += `</tbody></table>`;
        display.innerHTML = tableHTML;
    }

    function clearScreen() {
        document.getElementById('display-area').innerHTML = '<p style="text-align:center; color:#94a3b8; margin-top:80px;">Dashboard Cleared.</p>';
    }

    // पेज लोड होते ही डेटा लोड करें
    loadInitialData();
</script>

</body>
</html>
