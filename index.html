<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Comparative performance analysis of algorithms across C, C++, Java, and Python on Windows 11 and Kali Linux by Raman Kumar Baroliya.">
<meta name="keywords" content="Raman Kumar Baroliya, GEC Ajmer, Algorithm Performance, Windows vs Linux Benchmark, Python vs C++ Runtime, 24IT40, Kali Linux Algorithm Test">
<meta name="author" content="Raman Kumar Baroliya">

<meta property="og:title" content="Raman Kumar | Algorithm Benchmarking Project">
<meta property="og:description" content="Real-time performance data of MST and Digital Sum algorithms.">
<meta property="og:url" content="https://24it40-ctrl.github.io/Algorithm-Performance-Benchmark/">
    <title>Raman Kumar | Benchmarking Dashboard</title>
    <style>
        :root { --primary: #2563eb; --linux: #d97706; --win: #0284c7; --dark: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8fafc; margin: 0; padding: 20px; color: #334155; }
        .main-card { max-width: 1100px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.08); overflow: hidden; }
        header { background: var(--dark); color: white; padding: 35px; text-align: center; }
        .controls { display: flex; gap: 15px; justify-content: center; padding: 25px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
        .btn-win { background: var(--win); } .btn-linux { background: var(--linux); } .btn-clear { background: #64748b; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        #table-container { padding: 30px; min-height: 300px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 800px; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; font-size: 0.9em; }
        th { background: #f1f5f9; color: var(--dark); }
        .highlight { color: #2563eb; font-weight: bold; }
        .pdf-footer { text-align: center; padding: 30px; border-top: 2px solid #f1f5f9; }
        .download-btn { background: #10b981; color: white; padding: 15px 35px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; }
    </style>
</head>
    
<body>

<div class="main-card">
    <header>
        <h1>Performance Benchmarking Results</h1>
        <p>Raman Kumar | Roll No: 24IT40 | GEC Ajmer</p>
    </header>

    <div class="controls">
        <button class="btn-win" onclick="renderTable('windows_11')">Windows 11 (VS Code)</button>
        <button class="btn-linux" onclick="renderTable('kali_linux')">Kali Linux (Terminal)</button>
        <button class="btn-clear" onclick="clearView()">Clear View</button>
    </div>

    <div id="table-container">
        <p style="text-align: center; color: #94a3b8; margin-top: 100px;">Please select an environment to view benchmarking data.</p>
    </div>

    <div class="pdf-footer">
        <a href="assignment.pdf" class="download-btn" target="_blank">📄 Open Project Report (PDF)</a>
    </div>
</div>

<script>
    async function renderTable(osKey) {
        const response = await fetch('data.json');
        const data = await response.json();
        const rows = data.benchmarks[osKey];
        const container = document.getElementById('table-container');

        let html = `<h2 style="text-align:center; color: var(--dark); border-bottom: 2px solid #eee; padding-bottom: 10px;">${osKey.replace('_', ' ').toUpperCase()} Result Table</h2>`;
        html += `<table>
            <thead>
                <tr>
                    <th rowspan="2">Logic</th>
                    <th rowspan="2">Input</th>
                    <th rowspan="2">Result</th>
                    <th colspan="4">Runtime in ms</th>
                </tr>
                <tr>
                    <th>Python</th>
                    <th>C++</th>
                    <th>Java</th>
                    <th>C</th>
                </tr>
            </thead>
            <tbody>`;

        rows.forEach(row => {
            html += `<tr>
                <td><strong>${row.logic}</strong></td>
                <td>${row.input}</td>
                <td>${row.res}</td>
                <td class="highlight">${row.py}</td>
                <td class="highlight">${row.cpp}</td>
                <td class="highlight">${row.java}</td>
                <td class="highlight">${row.c}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function clearView() {
        document.getElementById('table-container').innerHTML = '<p style="text-align: center; color: #94a3b8; margin-top: 100px;">View cleared.</p>';
    }
</script>

</body>
</html>
