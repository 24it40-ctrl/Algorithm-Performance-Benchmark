<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raman Kumar | Pro Dashboard</title>
    <meta name="description" content="Algorithm Benchmarking by Raman Kumar Baroliya">
    <meta name="keywords" content="Raman Kumar, GEC Ajmer, 24IT40, Windows vs Linux Benchmark">
    
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 0; }
        
        /* Login Overlay */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { background: white; padding: 40px; border-radius: 15px; width: 350px; text-align: center; }
        .auth-card input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        
        .main-container { max-width: 1000px; margin: 20px auto; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; display: none; }
        header { background: var(--dark); color: white; padding: 30px; text-align: center; position: relative; }
        
        .stats-bar { display: flex; justify-content: center; gap: 30px; padding: 15px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; font-weight: bold; }
        .like-btn { cursor: pointer; color: var(--primary); }
        .dislike-btn { cursor: pointer; color: var(--danger); }
        
        .dashboard { padding: 30px; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-logout { background: #64748b; color: white; float: right; padding: 5px 15px; margin-top: -40px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; }
        th { background: #f8fafc; }

        .footer { text-align: center; padding: 30px; border-top: 2px solid #f1f5f9; }
        .pdf-btn { background: var(--success); color: white; padding: 15px 30px; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 id="auth-title">Login to Dashboard</h2>
        <input type="text" id="username" placeholder="Username (Try: Raman)">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-blue" style="width:100%" onclick="handleAuth()">Submit</button>
        <p style="font-size: 0.8em; margin-top: 15px; cursor: pointer; color: var(--primary);" onclick="toggleAuth()">New user? Sign up</p>
    </div>
</div>

<div class="main-container" id="app-content">
    <header>
        <button class="btn-logout" onclick="logout()">Logout</button>
        <h1>Performance Dashboard</h1>
        <p>Welcome, <span id="user-display"></span> (24IT40)</p>
    </header>

    <div class="stats-bar">
        <span>👁️ Views: <span id="view-count">0</span></span>
        <span class="like-btn" onclick="addLike()">👍 Likes: <span id="like-count">0</span></span>
        <span class="dislike-btn" onclick="addDislike()">👎 Dislikes: <span id="dislike-count">0</span></span>
    </div>

    <div class="dashboard">
        <div class="controls">
            <button class="btn-blue" onclick="loadTable('windows_11')">Windows 11 Data</button>
            <button class="btn-blue" style="background:#d97706" onclick="loadTable('kali_linux')">Kali Linux Data</button>
        </div>
        <div id="table-area">
            <p style="text-align:center; color:#94a3b8; margin-top:50px;">Please select an environment.</p>
        </div>
    </div>

    <div class="footer">
        <a href="assignment.pdf" class="pdf-btn" target="_blank">📄 View Project Report (PDF)</a>
    </div>
</div>

<script>
    // --- Logic for Likes, Views, and Auth ---
    let isLoginMode = true;

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Login to Dashboard" : "Create Account";
    }

    function handleAuth() {
        const user = document.getElementById('username').value;
        if(user) {
            localStorage.setItem('currentUser', user);
            initApp();
        } else { alert("Please enter a username"); }
    }

    function initApp() {
        const user = localStorage.getItem('currentUser');
        if(user) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('user-display').innerText = user;
            
            // Views Logic
            let views = parseInt(localStorage.getItem('pageViews') || 0);
            views++;
            localStorage.setItem('pageViews', views);
            document.getElementById('view-count').innerText = views;

            // Load Likes/Dislikes
            document.getElementById('like-count').innerText = localStorage.getItem('likes') || 0;
            document.getElementById('dislike-count').innerText = localStorage.getItem('dislikes') || 0;
        }
    }

    function addLike() {
        let likes = parseInt(localStorage.getItem('likes') || 0);
        likes++;
        localStorage.setItem('likes', likes);
        document.getElementById('like-count').innerText = likes;
    }

    function addDislike() {
        let dislikes = parseInt(localStorage.getItem('dislikes') || 0);
        dislikes++;
        localStorage.setItem('dislikes', dislikes);
        document.getElementById('dislike-count').innerText = dislikes;
    }

    function logout() {
        localStorage.removeItem('currentUser');
        location.reload();
    }

    async function loadTable(os) {
        const resp = await fetch('data.json');
        const data = await resp.json();
        const rows = data.benchmarks[os];
        let html = `<h3>${os.toUpperCase()} Results</h3><table><tr><th>Logic</th><th>Py</th><th>C++</th><th>Java</th><th>C</th></tr>`;
        rows.forEach(r => {
            html += `<tr><td>${r.logic}</td><td>${r.py}</td><td>${r.cpp}</td><td>${r.java}</td><td>${r.c}</td></tr>`;
        });
        html += `</table>`;
        document.getElementById('table-area').innerHTML = html;
    }

    // Check login on load
    window.onload = initApp;
</script>

</body>
</html>
